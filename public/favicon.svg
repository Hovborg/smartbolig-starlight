<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="chipGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="64" height="64" rx="14" fill="#0d1117"/>

  <!-- Glow effect -->
  <rect x="8" y="8" width="48" height="48" rx="12" fill="#06b6d4" opacity="0.3" filter="url(#glow)"/>

  <!-- CPU/Chip icon -->
  <g transform="translate(32, 32)">
    <!-- Main chip body -->
    <rect x="-14" y="-14" width="28" height="28" rx="4" fill="#1e293b" stroke="url(#chipGrad)" stroke-width="2.5"/>

    <!-- Inner core -->
    <rect x="-8" y="-8" width="16" height="16" rx="3" fill="url(#chipGrad)" opacity="0.5"/>

    <!-- Pins - top -->
    <line x1="-7" y1="-14" x2="-7" y2="-21" stroke="#06b6d4" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="-14" x2="0" y2="-21" stroke="#06b6d4" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="7" y1="-14" x2="7" y2="-21" stroke="#06b6d4" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Pins - bottom -->
    <line x1="-7" y1="14" x2="-7" y2="21" stroke="#06b6d4" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="14" x2="0" y2="21" stroke="#06b6d4" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="7" y1="14" x2="7" y2="21" stroke="#06b6d4" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Pins - left -->
    <line x1="-14" y1="-7" x2="-21" y2="-7" stroke="#06b6d4" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-14" y1="7" x2="-21" y2="7" stroke="#06b6d4" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Pins - right -->
    <line x1="14" y1="-7" x2="21" y2="-7" stroke="#06b6d4" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="14" y1="7" x2="21" y2="7" stroke="#06b6d4" stroke-width="2.5" stroke-linecap="round"/>
  </g>
</svg>
