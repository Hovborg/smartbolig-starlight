<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="chipGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Cirkulær baggrund -->
  <circle cx="256" cy="256" r="256" fill="#0d1117"/>

  <!-- Glow effekt -->
  <circle cx="256" cy="256" r="180" fill="#06b6d4" opacity="0.15" filter="url(#glow)"/>

  <!-- Chip container -->
  <g transform="translate(256, 256)">
    <!-- Chip base -->
    <rect x="-80" y="-80" width="160" height="160" rx="20" fill="#1e293b" stroke="url(#chipGrad)" stroke-width="8"/>

    <!-- Chip core -->
    <rect x="-50" y="-50" width="100" height="100" rx="12" fill="url(#chipGrad)" opacity="0.6"/>

    <!-- Pins - top -->
    <line x1="-40" y1="-80" x2="-40" y2="-120" stroke="#06b6d4" stroke-width="12" stroke-linecap="round"/>
    <line x1="0" y1="-80" x2="0" y2="-120" stroke="#06b6d4" stroke-width="12" stroke-linecap="round"/>
    <line x1="40" y1="-80" x2="40" y2="-120" stroke="#06b6d4" stroke-width="12" stroke-linecap="round"/>

    <!-- Pins - bottom -->
    <line x1="-40" y1="80" x2="-40" y2="120" stroke="#06b6d4" stroke-width="12" stroke-linecap="round"/>
    <line x1="0" y1="80" x2="0" y2="120" stroke="#06b6d4" stroke-width="12" stroke-linecap="round"/>
    <line x1="40" y1="80" x2="40" y2="120" stroke="#06b6d4" stroke-width="12" stroke-linecap="round"/>

    <!-- Pins - left -->
    <line x1="-80" y1="-40" x2="-120" y2="-40" stroke="#06b6d4" stroke-width="12" stroke-linecap="round"/>
    <line x1="-80" y1="40" x2="-120" y2="40" stroke="#06b6d4" stroke-width="12" stroke-linecap="round"/>

    <!-- Pins - right -->
    <line x1="80" y1="-40" x2="120" y2="-40" stroke="#06b6d4" stroke-width="12" stroke-linecap="round"/>
    <line x1="80" y1="40" x2="120" y2="40" stroke="#06b6d4" stroke-width="12" stroke-linecap="round"/>
  </g>
</svg>
