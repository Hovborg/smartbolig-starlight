<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">SmartBolig.net AI News hardware visual</title>
  <desc id="desc">Public-safe SmartBolig AI News visual with smart-home hardware, Home Assistant dashboard, local agents, and verified sources.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#071311"/>
      <stop offset="0.54" stop-color="#11231f"/>
      <stop offset="1" stop-color="#17271d"/>
    </linearGradient>
    <linearGradient id="desk" x1="80" y1="502" x2="1120" y2="610" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1d332d"/>
      <stop offset="1" stop-color="#26351f"/>
    </linearGradient>
    <linearGradient id="screen" x1="180" y1="126" x2="706" y2="392" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#102c31"/>
      <stop offset="1" stop-color="#0c1917"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="0.55" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0v42" fill="none" stroke="#254338" stroke-width="1" opacity="0.35"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.7"/>
  <rect x="72" y="82" width="1056" height="450" rx="8" fill="#0d1715" stroke="#2f5f4e" stroke-width="2"/>
  <rect x="76" y="506" width="1048" height="76" rx="8" fill="url(#desk)"/>

  <g opacity="0.38" filter="url(#glow)">
    <circle cx="184" cy="136" r="66" fill="#34d399"/>
    <circle cx="1024" cy="176" r="78" fill="#22d3ee"/>
    <circle cx="902" cy="476" r="92" fill="#fbbf24"/>
  </g>

  <!-- Workbench monitor with a public-safe Home Assistant style dashboard. -->
  <g transform="translate(144 118)">
    <rect x="0" y="0" width="584" height="328" rx="8" fill="#08100f" stroke="#3b6f5b" stroke-width="4"/>
    <rect x="22" y="22" width="540" height="270" rx="8" fill="url(#screen)"/>
    <rect x="74" y="306" width="436" height="18" rx="6" fill="#1b3029"/>
    <rect x="254" y="324" width="76" height="44" rx="6" fill="#14241f"/>
    <rect x="204" y="360" width="176" height="14" rx="7" fill="#2f5f4e"/>

    <text x="50" y="70" fill="#dff7ea" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" letter-spacing="0">Home Assistant</text>
    <text x="50" y="106" fill="#91b5a6" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" letter-spacing="0">Local agents + verified sources</text>

    <g font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="0">
      <rect x="50" y="136" width="132" height="88" rx="8" fill="#163226" stroke="#34d399"/>
      <text x="70" y="172" fill="#dff7ea">Sensors</text>
      <text x="70" y="202" fill="#7ce6b8">42 online</text>

      <rect x="204" y="136" width="132" height="88" rx="8" fill="#132b31" stroke="#22d3ee"/>
      <text x="224" y="172" fill="#dff9ff">Agents</text>
      <text x="224" y="202" fill="#91e7f1">reviewing</text>

      <rect x="358" y="136" width="132" height="88" rx="8" fill="#2f2815" stroke="#fbbf24"/>
      <text x="378" y="172" fill="#fff3cd">Sources</text>
      <text x="378" y="202" fill="#ffd36a">official</text>
    </g>

    <path d="M52 252c48-44 92-31 130-56s72-58 120-28 74 48 122 0 76-72 120-56" fill="none" stroke="url(#accent)" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- Smart-home and homelab hardware on the bench. -->
  <g transform="translate(118 454)">
    <rect x="0" y="14" width="136" height="76" rx="8" fill="#e8f3ee" stroke="#9eb8ae" stroke-width="3"/>
    <circle cx="38" cy="52" r="17" fill="#34d399"/>
    <rect x="70" y="36" width="40" height="10" rx="5" fill="#537368"/>
    <rect x="70" y="58" width="48" height="10" rx="5" fill="#537368"/>
    <text x="22" y="112" fill="#a9c7bb" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Shelly</text>
  </g>

  <g transform="translate(278 458)">
    <rect x="0" y="0" width="168" height="92" rx="8" fill="#103026" stroke="#34d399" stroke-width="3"/>
    <rect x="22" y="18" width="62" height="48" rx="5" fill="#1b5240" stroke="#8bf0c4"/>
    <circle cx="122" cy="26" r="7" fill="#fbbf24"/>
    <circle cx="146" cy="26" r="7" fill="#22d3ee"/>
    <g stroke="#8bf0c4" stroke-width="4" stroke-linecap="round">
      <path d="M16 78h136"/>
      <path d="M100 48h48"/>
      <path d="M100 64h32"/>
    </g>
    <text x="34" y="118" fill="#a9c7bb" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">ESP32 dev board</text>
  </g>

  <g transform="translate(494 462)">
    <rect x="0" y="0" width="120" height="86" rx="8" fill="#101a18" stroke="#22d3ee" stroke-width="3"/>
    <rect x="20" y="18" width="80" height="20" rx="10" fill="#dff9ff"/>
    <rect x="50" y="38" width="20" height="36" rx="5" fill="#22d3ee"/>
    <path d="M34 72c24-18 42-18 66 0" fill="none" stroke="#91e7f1" stroke-width="4" stroke-linecap="round"/>
    <text x="7" y="112" fill="#a9c7bb" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Zigbee coordinator</text>
  </g>

  <g transform="translate(818 352)">
    <rect x="0" y="0" width="246" height="152" rx="8" fill="#0c1413" stroke="#3b6f5b" stroke-width="3"/>
    <text x="24" y="36" fill="#dff7ea" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">Local AI stack</text>
    <g fill="#1b3029" stroke="#466d60">
      <rect x="24" y="58" width="198" height="24" rx="5"/>
      <rect x="24" y="92" width="198" height="24" rx="5"/>
      <rect x="24" y="126" width="198" height="24" rx="5"/>
    </g>
    <g fill="#34d399">
      <circle cx="42" cy="70" r="4"/>
      <circle cx="58" cy="70" r="4"/>
      <circle cx="74" cy="70" r="4"/>
    </g>
    <g fill="#22d3ee">
      <circle cx="42" cy="104" r="4"/>
      <circle cx="58" cy="104" r="4"/>
      <circle cx="74" cy="104" r="4"/>
    </g>
    <g fill="#fbbf24">
      <circle cx="42" cy="138" r="4"/>
      <circle cx="58" cy="138" r="4"/>
      <circle cx="74" cy="138" r="4"/>
    </g>
  </g>

  <!-- Article lockup. -->
  <g transform="translate(778 122)">
    <rect x="0" y="0" width="306" height="174" rx="8" fill="#111916" stroke="#2f5f4e" stroke-width="2"/>
    <text x="28" y="50" fill="#dff7ea" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800" letter-spacing="0">SmartBolig.net</text>
    <text x="28" y="116" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="900" letter-spacing="0">AI News</text>
    <rect x="28" y="136" width="112" height="8" rx="4" fill="#34d399"/>
    <rect x="148" y="136" width="70" height="8" rx="4" fill="#22d3ee"/>
    <rect x="226" y="136" width="44" height="8" rx="4" fill="#fbbf24"/>
  </g>

  <g transform="translate(778 316)" font-family="Inter, Arial, sans-serif" font-weight="750" letter-spacing="0">
    <rect x="0" y="0" width="152" height="44" rx="8" fill="#173328" stroke="#34d399"/>
    <text x="20" y="29" fill="#dff7ea" font-size="18">Codex</text>
    <rect x="164" y="0" width="144" height="44" rx="8" fill="#132d32" stroke="#22d3ee"/>
    <text x="184" y="29" fill="#dff9ff" font-size="18">Chrome AI</text>
    <rect x="0" y="56" width="152" height="44" rx="8" fill="#302815" stroke="#fbbf24"/>
    <text x="20" y="85" fill="#fff3cd" font-size="18">Gemini</text>
    <rect x="164" y="56" width="144" height="44" rx="8" fill="#1d2c27" stroke="#8fb9aa"/>
    <text x="184" y="85" fill="#d8eee5" font-size="18">OpenClaw</text>
  </g>

  <!-- Source path from web to hardware. -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M702 236c42 8 62 44 76 94" stroke="#34d399" stroke-width="4"/>
    <path d="M720 210c46-28 76-26 112 0" stroke="#22d3ee" stroke-width="4"/>
    <path d="M708 270c66 76 58 132-30 178" stroke="#fbbf24" stroke-width="4"/>
  </g>

  <text x="96" y="594" fill="#95afa5" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="650" letter-spacing="0">
    Public-safe hardware visual for source-backed AI updates
  </text>
</svg>
