<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 90 90" fill="none">
  <defs>
    <linearGradient id="chipGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="chipBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <g transform="translate(9, 9)">
    <!-- Cyan glow (static) -->
    <rect x="3" y="3" width="66" height="66" rx="14" fill="#06b6d4" opacity="0.6" filter="url(#chipBlur)"/>

    <!-- Background -->
    <rect width="72" height="72" rx="16" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>

    <!-- CPU/Chip icon -->
    <g transform="translate(36, 36)">
      <!-- Main chip body -->
      <rect x="-16" y="-16" width="32" height="32" rx="4" fill="#1e293b" stroke="url(#chipGrad)" stroke-width="3"/>

      <!-- Inner core -->
      <rect x="-10" y="-10" width="20" height="20" rx="3" fill="url(#chipGrad)" opacity="0.5"/>

      <!-- Pins - top -->
      <line x1="-8" y1="-16" x2="-8" y2="-24" stroke="#06b6d4" stroke-width="3" stroke-linecap="round"/>
      <line x1="0" y1="-16" x2="0" y2="-24" stroke="#06b6d4" stroke-width="3" stroke-linecap="round"/>
      <line x1="8" y1="-16" x2="8" y2="-24" stroke="#06b6d4" stroke-width="3" stroke-linecap="round"/>

      <!-- Pins - bottom -->
      <line x1="-8" y1="16" x2="-8" y2="24" stroke="#06b6d4" stroke-width="3" stroke-linecap="round"/>
      <line x1="0" y1="16" x2="0" y2="24" stroke="#06b6d4" stroke-width="3" stroke-linecap="round"/>
      <line x1="8" y1="16" x2="8" y2="24" stroke="#06b6d4" stroke-width="3" stroke-linecap="round"/>

      <!-- Pins - left -->
      <line x1="-16" y1="-8" x2="-24" y2="-8" stroke="#06b6d4" stroke-width="3" stroke-linecap="round"/>
      <line x1="-16" y1="8" x2="-24" y2="8" stroke="#06b6d4" stroke-width="3" stroke-linecap="round"/>

      <!-- Pins - right -->
      <line x1="16" y1="-8" x2="24" y2="-8" stroke="#06b6d4" stroke-width="3" stroke-linecap="round"/>
      <line x1="16" y1="8" x2="24" y2="8" stroke="#06b6d4" stroke-width="3" stroke-linecap="round"/>
    </g>
  </g>
</svg>
