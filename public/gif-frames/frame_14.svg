<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 180" fill="none">
  <defs>
    <linearGradient id="chipGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="chipBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
  </defs>

  <rect width="800" height="180" fill="#0d1117"/>

  <g transform="translate(18, 18)">
    <rect x="6" y="6" width="132" height="132" rx="28" fill="#06b6d4" opacity=".40" filter="url(#chipBlur)"/>
    <rect width="144" height="144" rx="32" fill="#0d1117" stroke="#30363d" stroke-width="3"/>
    <g transform="translate(72, 72)">
      <rect x="-32" y="-32" width="64" height="64" rx="8" fill="#1e293b" stroke="url(#chipGrad)" stroke-width="6"/>
      <rect x="-20" y="-20" width="40" height="40" rx="6" fill="url(#chipGrad)" opacity="0.5"/>
      <line x1="-16" y1="-32" x2="-16" y2="-48" stroke="#06b6d4" stroke-width="6" stroke-linecap="round" stroke-dasharray="8 8" stroke-dashoffset="6"/>
      <line x1="0" y1="-32" x2="0" y2="-48" stroke="#06b6d4" stroke-width="6" stroke-linecap="round" stroke-dasharray="8 8" stroke-dashoffset="0"/>
      <line x1="16" y1="-32" x2="16" y2="-48" stroke="#06b6d4" stroke-width="6" stroke-linecap="round" stroke-dasharray="8 8" stroke-dashoffset="2"/>
      <line x1="-16" y1="32" x2="-16" y2="48" stroke="#06b6d4" stroke-width="6" stroke-linecap="round" stroke-dasharray="8 8" stroke-dashoffset="7"/>
      <line x1="0" y1="32" x2="0" y2="48" stroke="#06b6d4" stroke-width="6" stroke-linecap="round" stroke-dasharray="8 8" stroke-dashoffset="1"/>
      <line x1="16" y1="32" x2="16" y2="48" stroke="#06b6d4" stroke-width="6" stroke-linecap="round" stroke-dasharray="8 8" stroke-dashoffset="3"/>
      <line x1="-32" y1="-16" x2="-48" y2="-16" stroke="#06b6d4" stroke-width="6" stroke-linecap="round" stroke-dasharray="8 8" stroke-dashoffset="6"/>
      <line x1="-32" y1="16" x2="-48" y2="16" stroke="#06b6d4" stroke-width="6" stroke-linecap="round" stroke-dasharray="8 8" stroke-dashoffset="0"/>
      <line x1="32" y1="-16" x2="48" y2="-16" stroke="#06b6d4" stroke-width="6" stroke-linecap="round" stroke-dasharray="8 8" stroke-dashoffset="7"/>
      <line x1="32" y1="16" x2="48" y2="16" stroke="#06b6d4" stroke-width="6" stroke-linecap="round" stroke-dasharray="8 8" stroke-dashoffset="1"/>
