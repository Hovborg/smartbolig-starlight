<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2560 1440" fill="none">
  <defs>
    <linearGradient id="chipGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="chipBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="50"/>
    </filter>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="2560" height="1440" fill="url(#bgGrad)"/>

  <!-- Decorative elements -->
  <g opacity="0.03">
    <circle cx="400" cy="300" r="200" stroke="#06b6d4" stroke-width="2" fill="none"/>
    <circle cx="2200" cy="1100" r="250" stroke="#06b6d4" stroke-width="2" fill="none"/>
  </g>

  <!-- Safe zone guide (1546x423 centered) - content goes here -->
  <g transform="translate(1280, 720)">
    <!-- Chip icon -->
    <g transform="translate(-350, -50)">
      <rect x="20" y="20" width="360" height="360" rx="80" fill="#06b6d4" opacity="0.4" filter="url(#chipBlur)"/>
      <rect width="400" height="400" rx="88" fill="#0d1117" stroke="#30363d" stroke-width="8"/>

      <g transform="translate(200, 200)">
        <rect x="-88" y="-88" width="176" height="176" rx="22" fill="#1e293b" stroke="url(#chipGrad)" stroke-width="16"/>
        <rect x="-56" y="-56" width="112" height="112" rx="16" fill="url(#chipGrad)" opacity="0.5"/>

        <line x1="-44" y1="-88" x2="-44" y2="-132" stroke="#06b6d4" stroke-width="16" stroke-linecap="round"/>
        <line x1="0" y1="-88" x2="0" y2="-132" stroke="#06b6d4" stroke-width="16" stroke-linecap="round"/>
        <line x1="44" y1="-88" x2="44" y2="-132" stroke="#06b6d4" stroke-width="16" stroke-linecap="round"/>

        <line x1="-44" y1="88" x2="-44" y2="132" stroke="#06b6d4" stroke-width="16" stroke-linecap="round"/>
        <line x1="0" y1="88" x2="0" y2="132" stroke="#06b6d4" stroke-width="16" stroke-linecap="round"/>
        <line x1="44" y1="88" x2="44" y2="132" stroke="#06b6d4" stroke-width="16" stroke-linecap="round"/>

        <line x1="-88" y1="-44" x2="-132" y2="-44" stroke="#06b6d4" stroke-width="16" stroke-linecap="round"/>
        <line x1="-88" y1="44" x2="-132" y2="44" stroke="#06b6d4" stroke-width="16" stroke-linecap="round"/>

        <line x1="88" y1="-44" x2="132" y2="-44" stroke="#06b6d4" stroke-width="16" stroke-linecap="round"/>
        <line x1="88" y1="44" x2="132" y2="44" stroke="#06b6d4" stroke-width="16" stroke-linecap="round"/>
      </g>
    </g>

    <!-- Text -->
    <text x="100" y="-20" font-family="system-ui, -apple-system, sans-serif" font-size="120" font-weight="600" fill="#e6edf3">Smart</text>
    <text x="100" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="120" font-weight="700" fill="#3fb950">Bolig</text>
    <text x="500" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="70" font-weight="400" fill="#6e7681">.net</text>
  </g>
</svg>
