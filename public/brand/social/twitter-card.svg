<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" fill="none">
  <defs>
    <linearGradient id="chipGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="chipBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="25"/>
    </filter>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bgGrad)"/>

  <!-- Decorative grid -->
  <g opacity="0.05">
    <line x1="0" y1="0" x2="1200" y2="600" stroke="#06b6d4" stroke-width="1"/>
    <line x1="0" y1="600" x2="1200" y2="0" stroke="#06b6d4" stroke-width="1"/>
  </g>

  <!-- Chip icon (left side) -->
  <g transform="translate(150, 150)">
    <rect x="20" y="20" width="260" height="260" rx="60" fill="#06b6d4" opacity="0.4" filter="url(#chipBlur)"/>
    <rect width="300" height="300" rx="66" fill="#0d1117" stroke="#30363d" stroke-width="6"/>

    <g transform="translate(150, 150)">
      <rect x="-66" y="-66" width="132" height="132" rx="16" fill="#1e293b" stroke="url(#chipGrad)" stroke-width="12"/>
      <rect x="-42" y="-42" width="84" height="84" rx="12" fill="url(#chipGrad)" opacity="0.5"/>

      <line x1="-33" y1="-66" x2="-33" y2="-99" stroke="#06b6d4" stroke-width="12" stroke-linecap="round"/>
      <line x1="0" y1="-66" x2="0" y2="-99" stroke="#06b6d4" stroke-width="12" stroke-linecap="round"/>
      <line x1="33" y1="-66" x2="33" y2="-99" stroke="#06b6d4" stroke-width="12" stroke-linecap="round"/>

      <line x1="-33" y1="66" x2="-33" y2="99" stroke="#06b6d4" stroke-width="12" stroke-linecap="round"/>
      <line x1="0" y1="66" x2="0" y2="99" stroke="#06b6d4" stroke-width="12" stroke-linecap="round"/>
      <line x1="33" y1="66" x2="33" y2="99" stroke="#06b6d4" stroke-width="12" stroke-linecap="round"/>

      <line x1="-66" y1="-33" x2="-99" y2="-33" stroke="#06b6d4" stroke-width="12" stroke-linecap="round"/>
      <line x1="-66" y1="33" x2="-99" y2="33" stroke="#06b6d4" stroke-width="12" stroke-linecap="round"/>

      <line x1="66" y1="-33" x2="99" y2="-33" stroke="#06b6d4" stroke-width="12" stroke-linecap="round"/>
      <line x1="66" y1="33" x2="99" y2="33" stroke="#06b6d4" stroke-width="12" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Text -->
  <text x="520" y="275" font-family="system-ui, -apple-system, sans-serif" font-size="90" font-weight="600" fill="#e6edf3">Smart</text>
  <text x="520" y="375" font-family="system-ui, -apple-system, sans-serif" font-size="90" font-weight="700" fill="#3fb950">Bolig</text>
  <text x="870" y="375" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="400" fill="#6e7681">.net</text>

  <text x="520" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="400" fill="#8b949e">Smart home guides til danskere</text>
</svg>
