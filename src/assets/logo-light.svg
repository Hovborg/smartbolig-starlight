<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 180" fill="none">
  <defs>
    <linearGradient id="chipGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
    <filter id="chipBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
    <style>
      @keyframes chipPulse {
        0%, 100% { opacity: 0.2; }
        50% { opacity: 0.4; }
      }
      @keyframes pinFlow {
        0% { stroke-dashoffset: 8; }
        100% { stroke-dashoffset: 0; }
      }
      .chip-glow { animation: chipPulse 3s ease-in-out infinite; }
      .pin { animation: pinFlow 1s linear infinite; }
    </style>
  </defs>

  <g transform="translate(18, 18)">
    <rect x="6" y="6" width="132" height="132" rx="28" fill="#0891b2" class="chip-glow" filter="url(#chipBlur)"/>
    <rect width="144" height="144" rx="32" fill="#f8fafc" stroke="#cbd5e1" stroke-width="3"/>
    <g transform="translate(72, 72)">
      <rect x="-32" y="-32" width="64" height="64" rx="8" fill="#e2e8f0" stroke="url(#chipGrad)" stroke-width="6"/>
      <rect x="-20" y="-20" width="40" height="40" rx="6" fill="url(#chipGrad)" opacity="0.5"/>
      <line x1="-16" y1="-32" x2="-16" y2="-48" stroke="#0891b2" stroke-width="6" stroke-linecap="round" class="pin" stroke-dasharray="8 8"/>
      <line x1="0" y1="-32" x2="0" y2="-48" stroke="#0891b2" stroke-width="6" stroke-linecap="round" class="pin" stroke-dasharray="8 8" style="animation-delay: 0.1s"/>
      <line x1="16" y1="-32" x2="16" y2="-48" stroke="#0891b2" stroke-width="6" stroke-linecap="round" class="pin" stroke-dasharray="8 8" style="animation-delay: 0.2s"/>
      <line x1="-16" y1="32" x2="-16" y2="48" stroke="#0891b2" stroke-width="6" stroke-linecap="round" class="pin" stroke-dasharray="8 8" style="animation-delay: 0.05s"/>
      <line x1="0" y1="32" x2="0" y2="48" stroke="#0891b2" stroke-width="6" stroke-linecap="round" class="pin" stroke-dasharray="8 8" style="animation-delay: 0.15s"/>
      <line x1="16" y1="32" x2="16" y2="48" stroke="#0891b2" stroke-width="6" stroke-linecap="round" class="pin" stroke-dasharray="8 8" style="animation-delay: 0.25s"/>
      <line x1="-32" y1="-16" x2="-48" y2="-16" stroke="#0891b2" stroke-width="6" stroke-linecap="round" class="pin" stroke-dasharray="8 8"/>
      <line x1="-32" y1="16" x2="-48" y2="16" stroke="#0891b2" stroke-width="6" stroke-linecap="round" class="pin" stroke-dasharray="8 8" style="animation-delay: 0.1s"/>
      <line x1="32" y1="-16" x2="48" y2="-16" stroke="#0891b2" stroke-width="6" stroke-linecap="round" class="pin" stroke-dasharray="8 8" style="animation-delay: 0.05s"/>
      <line x1="32" y1="16" x2="48" y2="16" stroke="#0891b2" stroke-width="6" stroke-linecap="round" class="pin" stroke-dasharray="8 8" style="animation-delay: 0.15s"/>
    </g>
  </g>

  <text x="200" y="116" font-family="system-ui, -apple-system, sans-serif" font-size="76" font-weight="600" fill="#1e293b">Smart</text>
  <text x="404" y="116" font-family="system-ui, -apple-system, sans-serif" font-size="76" font-weight="700" fill="#15803d">Bolig</text>
  <text x="620" y="116" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="400" fill="#64748b">.net</text>
</svg>
