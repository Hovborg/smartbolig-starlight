name: Draft AI News

on:
  workflow_dispatch:
    inputs:
      date:
        description: "News date in YYYY-MM-DD. Defaults to today in UTC."
        required: false
        type: string
      allow_weak_signal:
        description: "Create a low-signal issue instead of skipping the day."
        required: false
        default: false
        type: boolean
      force:
        description: "Overwrite an existing issue for the same date."
        required: false
        default: false
        type: boolean

jobs:
  draft:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      INPUT_DATE: ${{ inputs.date }}
      INPUT_ALLOW_WEAK_SIGNAL: ${{ inputs.allow_weak_signal }}
      INPUT_FORCE: ${{ inputs.force }}

    steps:
      - name: Checkout
        # SHA-pinned (v4) and credential-free: the push step below injects the
        # token itself, so earlier steps (npm ci, feed fetching) never see it.
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check AI news sources
        run: npm run ai-news:source-health

      - name: Draft AI news pages
        run: |
          DATE="${INPUT_DATE:-$(date -u +%F)}"
          # The date ends up in filenames and branch names — enforce YYYY-MM-DD.
          if ! echo "$DATE" | grep -qE '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'; then
            echo "Invalid date format: ${DATE} (expected YYYY-MM-DD)" >&2
            exit 1
          fi
          ARGS=(--write --date "$DATE" --days 10)
          if [ "$INPUT_ALLOW_WEAK_SIGNAL" = "true" ]; then
            ARGS+=(--allow-weak-signal)
          fi
          if [ "$INPUT_FORCE" = "true" ]; then
            ARGS+=(--force)
          fi
          node scripts/ai-news-publish.mjs "${ARGS[@]}"
          echo "AI_NEWS_DATE=$DATE" >> "$GITHUB_ENV"

      - name: Check for changes
        id: changes
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No publishable AI news changes."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            git status --short
          fi

      - name: Validate AI news
        if: steps.changes.outputs.has_changes == 'true'
        run: npm run ai-news:validate

      - name: Build
        if: steps.changes.outputs.has_changes == 'true'
        run: npm run build

      - name: Create pull request
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="ai-news/${AI_NEWS_DATE}-${GITHUB_RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Checkout runs with persist-credentials: false; authenticate only here.
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git switch -c "$BRANCH"
          # NOTE: .github/workflows is deliberately NOT staged — CI definitions
          # must only be changed by humans, never by the automated news pipeline.
          git add src/content.config.ts src/content/docs src/pages public/_redirects package.json scripts
          git commit -m "Draft AI news for ${AI_NEWS_DATE}"
          git push --set-upstream origin "$BRANCH"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Draft AI news for ${AI_NEWS_DATE}" \
            --body "Daily AI News draft generated from official sources. Validation and build passed. Review the source links and wording before merge."
