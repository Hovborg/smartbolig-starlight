name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
      deployments: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build
      
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.81.1"
          command: pages deploy dist --project-name=smartbolig-starlight

      - name: Ping IndexNow
        run: |
          curl --fail-with-body -sS -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d '{
              "host": "smartbolig.net",
              "key": "${{ secrets.INDEXNOW_KEY }}",
              "keyLocation": "https://smartbolig.net/${{ secrets.INDEXNOW_KEY }}.txt",
              "urlList": [
                "https://smartbolig.net/",
                "https://smartbolig.net/da/",
                "https://smartbolig.net/en/",
                "https://smartbolig.net/da/home-assistant/",
                "https://smartbolig.net/en/home-assistant/",
                "https://smartbolig.net/da/esp32/",
                "https://smartbolig.net/en/esp32/",
                "https://smartbolig.net/da/produkter/",
                "https://smartbolig.net/en/produkter/",
                "https://smartbolig.net/da/ai/",
                "https://smartbolig.net/en/ai/",
                "https://smartbolig.net/da/ai/ai-cli/",
                "https://smartbolig.net/en/ai/ai-cli/",
                "https://smartbolig.net/da/ai/ai-cli/sammenligning/",
                "https://smartbolig.net/en/ai/ai-cli/sammenligning/",
                "https://smartbolig.net/da/ai/ai-cli/priser-og-planer/",
                "https://smartbolig.net/en/ai/ai-cli/priser-og-planer/",
                "https://smartbolig.net/da/home-assistant/elbil-opvarmning/",
                "https://smartbolig.net/en/home-assistant/elbil-opvarmning/",
                "https://smartbolig.net/da/home-assistant/fugtighed-alarm-affugter/",
                "https://smartbolig.net/en/home-assistant/fugtighed-alarm-affugter/"
              ]
            }'
          echo "IndexNow ping sent!"
